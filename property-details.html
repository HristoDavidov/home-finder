<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Finder | Property Details</title>
  </head>
  <body>
    <main class="property-details-page pb-5">
      <section class="property-details-shell py-5">
        <div class="container">
          <div id="property-details-feedback" class="mb-4"></div>
          <div id="property-details-content" class="d-none">
            <div class="row g-4 g-xl-5 align-items-start">
              <div class="col-12 col-xl-7">
                <section class="details-gallery card border-0 shadow-sm overflow-hidden">
                  <div id="property-gallery" class="carousel slide" data-bs-ride="false">
                    <div class="carousel-inner" id="property-gallery-inner"></div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#property-gallery" data-bs-slide="prev">
                      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                      <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#property-gallery" data-bs-slide="next">
                      <span class="carousel-control-next-icon" aria-hidden="true"></span>
                      <span class="visually-hidden">Next</span>
                    </button>
                  </div>
                  <div class="details-gallery__thumbs p-3" id="property-gallery-thumbs"></div>
                </section>
              </div>

              <div class="col-12 col-xl-5">
                <div class="d-flex flex-wrap gap-2 align-items-center mb-3" id="property-badges"></div>
                <div class="d-flex flex-column gap-3">
                  <div>
                    <h1 class="display-6 fw-bold mb-2" id="property-title"></h1>
                    <p class="lead text-secondary mb-0" id="property-location"></p>
                  </div>

                  <div class="details-summary card border-0 shadow-sm">
                    <div class="card-body p-4">
                      <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                        <div>
                          <p class="text-uppercase small fw-semibold text-secondary mb-2">Asking price</p>
                          <p class="details-price mb-0" id="property-price"></p>
                        </div>
                        <button id="favorite-button" class="btn btn-outline-danger" type="button">Save to favorites</button>
                      </div>

                      <div class="row g-3" id="property-facts"></div>

                      <div class="d-flex flex-wrap gap-3 mt-4 d-none" id="owner-actions">
                        <a class="btn btn-dark" id="edit-property-button" href="/create-property.html">Edit</a>
                        <button class="btn btn-outline-dark" id="delete-property-button" type="button">Delete</button>
                      </div>
                    </div>
                  </div>

                  <section class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                      <h2 class="h4 mb-3">Property information</h2>
                      <p class="text-secondary mb-0" id="property-description"></p>
                    </div>
                  </section>

                  <section class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                      <h2 class="h4 mb-3">Owner information</h2>
                      <div class="owner-card d-flex gap-3 align-items-start">
                        <div class="owner-card__avatar" id="owner-avatar"></div>
                        <div>
                          <h3 class="h5 mb-1" id="owner-name"></h3>
                          <p class="text-secondary mb-2" id="owner-phone"></p>
                          <p class="small text-secondary mb-0">Reach out to learn more about this property and schedule the next step.</p>
                        </div>
                      </div>
                    </div>
                  </section>

                  <section class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                      <h2 class="h4 mb-3">Map</h2>
                      <div class="map-placeholder d-flex align-items-center justify-content-center text-center" id="map-placeholder"></div>
                    </div>
                  </section>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/js/pages/property-details.js"></script>
  </body>
</html>
